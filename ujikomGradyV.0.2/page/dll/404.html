<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1c1c1c;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 40px;
            width: 80%;
            max-width: 600px;
            z-index: 2;
        }

        h1 {
            font-size: 120px;
            color: rgb(255, 185, 93); /* Menggunakan warna yang kamu minta */
            margin: 0;
            animation: bounce 1s ease infinite;
        }

        p {
            font-size: 20px;
            color: #bbb;
            margin-top: 20px;
        }

        .line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, rgb(255, 185, 93), #ff0066, rgb(255, 185, 93)); /* Gradient dengan warna yang kamu pilih */
            animation: moveLine 2s linear infinite;
            z-index: 1;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes moveLine {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

    </style>
</head>
<body>

    <!-- Background Line Animation -->
    <div class="line"></div>

    <div class="container">
        <h1>404</h1>
        <p>Oopss... Halaman yang kamu cari tidak ditemukan!</p>
    </div>

</body>
</html>
